<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Debug Page</title>
</head>
<body>
    <h1>Debug Test</h1>
    <div id="test">Loading...</div>
    <div id="apps">Apps: Loading...</div>
    <div id="history">History: Loading...</div>
    
    <script>
        // Simple test to see if JavaScript works
        document.getElementById('test').textContent = 'JavaScript is working!';
        
        // Test API call
        fetch('/api/apps')
            .then(response => response.json())
            .then(data => {
                document.getElementById('apps').textContent = 'Apps loaded: ' + data.apps.length;
                document.getElementById('history').textContent = 'History entries: ' + data.history.length;
                
                // Test render functions
                try {
                    console.log('Testing render functions...');
                    // If we had access to render functions, we would test them here
                } catch (e) {
                    console.error('Render function error:', e);
                }
            })
            .catch(error => {
                document.getElementById('apps').textContent = 'Error: ' + error.message;
                console.error('Fetch error:', error);
            });
    </script>
</body>
</html>

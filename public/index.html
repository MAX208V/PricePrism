<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PricePrism - Play App 价格监控</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <!-- Hero Band -->
    <header class="hero-band">
      <div class="hero-content">
        <span class="logo-badge">
          <span class="material-symbols-rounded">diamond</span>
          PricePrism
        </span>
        <h1 class="hero-title">Google Play<br>价格监控</h1>
        <p class="hero-subtitle">实时追踪应用价格变动，降价第一时间通知</p>
      </div>
    </header>

    <main class="main-content">
      <!-- Card 1: Search -->
      <section class="card card-search">
        <div class="card-header">
          <span class="material-symbols-rounded card-icon">search</span>
          <h2 class="card-title">搜索应用</h2>
        </div>
        <div class="search-box">
          <input type="text" class="input" id="searchInput" placeholder="输入应用名称或包名...">
          <button class="btn btn-primary" onclick="doSearch()">
            <span class="material-symbols-rounded">search</span>
          </button>
        </div>
        <div id="searchResults" class="search-results"></div>
      </section>

      <!-- Card 2: Monitored Apps -->
      <section class="card card-apps">
        <div class="card-header">
          <span class="material-symbols-rounded card-icon">monitoring</span>
          <h2 class="card-title">监控列表</h2>
          <span class="card-badge" id="appsCount">0</span>
        </div>
        <div id="appsList" class="apps-grid">
          <div class="empty-state">加载中...</div>
        </div>
      </section>

      <!-- Card 3: Add App -->
      <section class="card card-add">
        <div class="card-header">
          <span class="material-symbols-rounded card-icon">add_circle</span>
          <h2 class="card-title">添加应用</h2>
        </div>
        <form id="addForm" class="form" onsubmit="handleAddApp(event)">
          <div class="form-row">
            <div class="form-field form-field--grow">
              <label class="label">包名 <span class="label-required">*</span></label>
              <input type="text" class="input" name="app_id" placeholder="com.example.app" required>
            </div>
            <div class="form-field">
              <label class="label">地区</label>
              <input type="text" class="input" name="country" value="us" style="width: 80px;">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label class="label">显示名称 <span class="label-optional">(可选)</span></label>
              <input type="text" class="input" name="name" placeholder="留空自动获取">
            </div>
            <div class="form-field">
              <label class="label">降价阈值</label>
              <input type="number" class="input" name="threshold" step="0.01" value="6.00" style="width: 100px;">
            </div>
          </div>
          <div class="form-field">
            <label class="label">备注</label>
            <input type="text" class="input" name="note" placeholder="可填写备注信息">
          </div>
          <div class="form-row form-row--align-center">
            <label class="toggle">
              <input type="checkbox" class="toggle-input" name="monitor_mode">
              <span class="toggle-slider"></span>
              <span class="toggle-label">价格变动时通知</span>
            </label>
            <button type="submit" class="btn btn-primary">
              <span class="material-symbols-rounded">add</span>
              添加监控
            </button>
          </div>
        </form>
      </section>

      <!-- Card 4: Notification History -->
      <section class="card card-history">
        <div class="card-header">
          <span class="material-symbols-rounded card-icon">notifications</span>
          <h2 class="card-title">通知记录</h2>
          <span class="card-badge" id="historyCount">0</span>
        </div>
        <div id="historyList" class="history-list">
          <div class="empty-state">暂无记录</div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Cloudflare Workers · Wise Design</p>
    </footer>
  </div>

  <!-- Edit Modal -->
  <div id="editOverlay" class="overlay" onclick="if(event.target===this)closeEditModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 class="modal-title">编辑应用</h2>
        <button class="btn btn-icon" onclick="closeEditModal()">
          <span class="material-symbols-rounded">close</span>
        </button>
      </div>
      <form id="editForm" onsubmit="handleEditApp(event)">
        <div class="form-field">
          <label class="label">显示名称</label>
          <input type="text" class="input" id="editName" required>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label class="label">降价阈值</label>
            <input type="number" class="input" id="editThreshold" step="0.01" required>
          </div>
          <div class="form-field">
            <label class="label">地区</label>
            <input type="text" class="input" id="editCountry">
          </div>
        </div>
        <div class="form-field">
          <label class="label">备注</label>
          <input type="text" class="input" id="editNote" placeholder="可填写备注信息">
        </div>
        <label class="toggle">
          <input type="checkbox" class="toggle-input" id="editMonitorMode">
          <span class="toggle-slider"></span>
          <span class="toggle-label">价格变动时通知</span>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeEditModal()">取消</button>
          <button type="submit" class="btn btn-primary">保存更改</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detailOverlay" class="overlay" onclick="if(event.target===this)closeDetailModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 class="modal-title">添加到监控</h2>
        <button class="btn btn-icon" onclick="closeDetailModal()">
          <span class="material-symbols-rounded">close</span>
        </button>
      </div>
      <div id="detailContent" class="detail-preview"></div>
      <div class="form-field">
        <label class="label">降价阈值</label>
        <input type="number" class="input" id="detailThreshold" step="0.01" value="6.00">
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="label">地区</label>
          <input type="text" class="input" id="detailCountry" value="us">
        </div>
        <div class="form-field">
          <label class="label">备注</label>
          <input type="text" class="input" id="detailNote" placeholder="可选">
        </div>
      </div>
      <label class="toggle">
        <input type="checkbox" class="toggle-input" id="detailMonitorMode">
        <span class="toggle-slider"></span>
        <span class="toggle-label">价格变动时通知</span>
      </label>
      <button class="btn btn-primary btn-full" onclick="addFromDetail()">
        <span class="material-symbols-rounded">add</span>
        添加监控
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>PricePrism</title><link rel="stylesheet" href="/styles.css"><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet"></head><body>

  <div class="bg-wallpaper" id="bgWallpaper"></div>
  <div class="bg-overlay"></div>

<main class="layout">

  <!-- Hero -->
  <header class="hero">
    <div class="hero-content">
      <div class="hero-logo"><span class="material-symbols-rounded" style="font-size:36px;color:var(--primary);">monitoring</span><span class="hero-brand">PricePrism</span></div>
      <p class="hero-sub">Google Play 应用价格监控仪表盘</p>
    </div>
  </header>

  <!-- 搜索卡片（含添加功能） -->
  <section class="card card--search">
    <div class="card-header">
      <span class="card-logo"><span class="material-symbols-rounded">search</span></span>
      <span class="card-title">搜索应用</span>
    </div>
    <div class="search-bar">
      <input type="text" class="input search-input" id="searchInput" placeholder="输入应用名称或包名…">
      <button class="btn btn--primary" onclick="doSearch()"><span class="material-symbols-rounded">search</span></button>
    </div>
    <div id="searchResults" class="search-results"></div>

    <div class="add-collapse" onclick="toggleAddForm()">
      <span class="material-symbols-rounded">add_circle</span>
      <span>添加手动监控</span>
      <span class="material-symbols-rounded add-arrow">expand_more</span>
    </div>
    <form class="add-form" id="addForm" onsubmit="handleAddApp(event)" style="display:none;">
      <div class="form-field"><label class="label">包名 *</label><input type="text" class="input" name="app_id" required placeholder="com.example.app"></div>
      <div class="form-field"><label class="label">显示名称</label><input type="text" class="input" name="name" placeholder="留空自动获取"></div>
      <div class="form-field"><label class="label">降价阈值 $</label><input type="number" class="input" name="threshold" step="0.01" min="0.01" value="6" required></div>
      <div class="form-field"><label class="label">备注</label><input type="text" class="input" name="note" placeholder="可选"></div>
      <div class="form-field"><label class="label">监控区域 <button type="button" class="btn btn--ghost btn--sm" onclick="toggleCountryPicker('addCountries')" style="font-size:11px;">选择区域</button></label>
        <div id="addCountries" class="country-grid" style="display:none;"></div>
      </div>
      <label class="toggle"><input type="checkbox" class="toggle-input" name="monitor_mode"><span class="toggle-slider"></span><span class="toggle-label">价格变动时通知（任意变化）</span></label>
      <button class="btn btn--primary btn--full" type="submit">添加</button>
    </form>
  </section>

  <!-- 监控列表卡片 -->
  <section class="card card--list">
    <div class="card-header">
      <span class="card-logo"><span class="material-symbols-rounded">monitoring</span></span>
      <span class="card-title">监控列表</span>
      <span class="card-actions">
        <span class="card-badge card-badge-refresh" onclick="checkPrices()" title="立即检查价格"><span class="material-symbols-rounded" style="font-size:11px;line-height:inherit;vertical-align:middle;">refresh</span></span>
        <span class="card-badge" id="appsCount">0</span>
      </span>
    </div>
    <div id="appsList"></div>
  </section>

  <!-- 通知记录卡片 -->
  <section class="card card--list">
    <div class="card-header">
      <span class="card-logo"><span class="material-symbols-rounded">notifications</span></span>
      <span class="card-title">通知记录</span>
      <span class="card-badge" id="historyCount">0</span>
    </div>
    <div id="historyList" class="history-list"></div>
  </section>

</main>

<!-- 详情弹窗 -->
<div class="overlay" id="detailOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">应用详情</span>
      <button class="btn btn-icon" onclick="closeDetailModal()"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div id="detailContent" class="detail-preview"></div>
    <div id="detailIAP" class="detail-preview-iap" style="display:none;"></div>
    <div class="modal-body">
      <div class="form-field"><label class="label">降价阈值 $</label><input type="number" class="input" id="detailThreshold" step="0.01" min="0.01" value="6"></div>
      <label class="toggle"><input type="checkbox" class="toggle-input" id="detailMonitorMode"><span class="toggle-slider"></span><span class="toggle-label">价格变动时通知</span></label>
      <div class="form-field"><label class="label">备注</label><input type="text" class="input" id="detailNote" placeholder="可选"></div>
      <button class="btn btn--primary btn--full" onclick="addFromDetail()">添加到监控列表</button>
    </div>
  </div>
</div>

<!-- 编辑弹窗 -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">编辑监控</span>
      <button class="btn btn-icon" onclick="closeEditModal()"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div class="modal-body">
      <div class="form-field"><label class="label">应用名称</label><input type="text" class="input" id="editName"></div>
      <div class="form-field"><label class="label">降价阈值 $</label><input type="number" class="input" id="editThreshold" step="0.01" min="0.01"></div>
      <div class="form-field"><label class="label">备注</label><input type="text" class="input" id="editNote"></div>
      <div class="form-field"><label class="label">监控区域 <button type="button" class="btn btn--ghost btn--sm" onclick="toggleCountryPicker('editCountries')" style="font-size:11px;">选择区域</button></label>
        <div id="editCountries" class="country-grid" style="display:none;"></div>
      </div>
      <label class="toggle"><input type="checkbox" class="toggle-input" id="editMonitorMode"><span class="toggle-slider"></span><span class="toggle-label">价格变动时通知</span></label>
      <div id="editIAPRow" class="form-field" style="padding-top:var(--space-md);border-top:1px solid var(--canvas-soft);">
        <label class="toggle" style="margin-bottom:var(--space-sm);"><input type="checkbox" class="toggle-input iap-checkbox"><span class="toggle-slider"></span><span class="toggle-label">监控内购最低价</span></label>
        <div style="display:flex;align-items:center;gap:var(--space-sm);"><input type="number" class="input iap-threshold-input" step="0.01" style="height:36px;width:100px;" placeholder="阈值$"><span style="font-size:11px;color:var(--mute);">低于此价时通知</span></div>
      </div>
      <button class="btn btn--primary btn--full" onclick="handleEditApp()">保存修改</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="/app.js"></script>
</body></html>

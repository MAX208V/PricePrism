<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Simple Price Monitor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { margin: 20px 0; }
        .app-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Simple Price Monitor</h1>
        
        <div class="section">
            <h2>Status</h2>
            <div id="simple-status">Loading...</div>
        </div>
        
        <div class="section">
            <h2>Monitored Apps</h2>
            <div id="simple-apps">Loading apps...</div>
        </div>
        
        <div class="section">
            <h2>Add New App</h2>
            <form id="simple-form">
                <div>
                    <label>App ID:</label>
                    <input type="text" id="app_id" placeholder="com.example.app" required>
                </div>
                <div>
                    <label>Threshold ($):</label>
                    <input type="number" id="threshold" value="6" min="0" step="0.01" required>
                </div>
                <div>
                    <label>Country:</label>
                    <input type="text" id="country" value="us" required>
                </div>
                <button type="submit">Add App</button>
            </form>
        </div>
    </div>
    
    <script src="/simple-app.js"></script>
    <script>
        document.getElementById('simple-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const appId = document.getElementById('app_id').value;
            const threshold = parseFloat(document.getElementById('threshold').value);
            const country = document.getElementById('country').value;
            
            try {
                const response = await fetch('/api/apps', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        app_id: appId,
                        threshold: threshold,
                        country: country
                    })
                });
                
                if (response.ok) {
                    alert('App added successfully!');
                    location.reload();
                } else {
                    const errorData = await response.json();
                    alert('Error: ' + (errorData.error || 'Failed to add app'));
                }
            } catch (error) {
                alert('Network error: ' + error.message);
            }
        });
    </script>
</body>
</html>

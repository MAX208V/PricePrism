<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JavaScript Test</title>
</head>
<body>
    <h1>JavaScript Functions Test</h1>
    <div id="result">Testing...</div>
    
    <script>
        // Test if required functions are available
        const tests = [
            { name: 'fetch', available: typeof fetch !== 'undefined' },
            { name: 'window.renderAppCards', available: typeof window.renderAppCards === 'function' },
            { name: 'window.renderHistory', available: typeof window.renderHistory === 'function' },
            { name: 'getElementById', available: typeof document.getElementById === 'function' }
        ];
        
        const passedTests = tests.filter(test => test.available).length;
        const totalTests = tests.length;
        
        let resultHTML = `<h2>Test Results: ${passedTests}/${totalTests} passed</h2><ul>`;
        tests.forEach(test => {
            resultHTML += `<li style="color: ${test.available ? 'green' : 'red'}">
                ${test.name}: ${test.available ? '✓ Available' : '✗ Missing'}
            </li>`;
        });
        resultHTML += '</ul>';
        
        document.getElementById('result').innerHTML = resultHTML;
    </script>
    
    <!-- Load the actual scripts to test them -->
    <script src="/js/api.js"></script>
    <script src="/js/render.js"></script>
    <script>
        // Additional test after scripts are loaded
        setTimeout(() => {
            const extraTests = [
                { name: 'After load - renderAppCards', available: typeof window.renderAppCards === 'function' },
                { name: 'After load - renderHistory', available: typeof window.renderHistory === 'function' }
            ];
            
            let extraHTML = '<h3>After Script Loading:</h3><ul>';
            extraTests.forEach(test => {
                extraHTML += `<li style="color: ${test.available ? 'green' : 'red'}">
                    ${test.name}: ${test.available ? '✓ Available' : '✗ Missing'}
                </li>`;
            });
            extraHTML += '</ul>';
            
            document.getElementById('result').innerHTML += extraHTML;
        }, 1000);
    </script>
</body>
</html>

# wrangler.toml
name = 'price-prism'
main = 'src/index.js'
compatibility_date = "2024-02-20"
keep_vars = true

# 自定义域名
routes = [
  { pattern = "play.maxcloud.fun", custom_domain = true }
]

# D1 数据库（应用配置、价格走势、通知记录）
[[d1_databases]]
binding = "DB"
database_name = "priceprism-db"
database_id = "08dab003-cdff-4043-805d-4be32758c96e"

# R2 存储桶（应用图标缓存）
[[r2_buckets]]
binding = "ICONS"
bucket_name = "priceprism-icons"

# 定时触发器：每 15 分钟执行（UTC）
[triggers]
crons = ["*/15 * * * *"]

# 静态资源
[assets]
directory = "public"
binding = "ASSETS"

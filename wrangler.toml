# Play Scraper API - Cloudflare Workers Configuration
# Architecture: Workers + KV + Cron + Assets

name = 'play-scraper-api'
main = "_worker.js"
compatibility_date = "2024-02-20"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

# ================== Assets (Static Files) ==================
# Serve frontend static files
[site]
bucket = "./public"

# ================== KV Namespaces ==================
[[kv_namespaces]]
binding = "KV"
id = "8b89d8b5c511457390f5aee4cce00570"

# ================== Cron Triggers ==================
# Run price check every hour
[triggers]
crons = ["0 * * * *"]

# ================== Environment Variables ==================
# Set these via wrangler secret put:
# - SC3_KEY: ServerChan3 notification key
# - PROXY_URL: CORS proxy URL for search functionality
